  #   tty: true
  #   restart: unless-stopped

  # MySQL
  # mysql:
  #   image: mysql:8.0
  #   profiles:
  #     - openclaw
  #   container_name: mysql8
  #   ports:
  #     - "3306:3306"
  #   environment:
  #     MYSQL_ROOT_PASSWORD: root
  #     MYSQL_DATABASE: app_db
  #   networks:
