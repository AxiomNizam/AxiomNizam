services:
  # Go application
  axiomnizam:
    build: .
    container_name: axiomnizam
    # image: shafiunmiraz/axiomnizam-axiomnizam:latest
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      OPENCLAW_SQL_ASSISTANT_URL: ${OPENCLAW_SQL_ASSISTANT_URL:-}
      OPENCLAW_SQL_ASSISTANT_TOKEN: ${OPENCLAW_SQL_ASSISTANT_TOKEN:-}
      OPENCLAW_SQL_ASSISTANT_MODEL: ${OPENCLAW_SQL_ASSISTANT_MODEL:-openclaw}
      OPENCLAW_SQL_ASSISTANT_TIMEOUT_SECONDS: ${OPENCLAW_SQL_ASSISTANT_TIMEOUT_SECONDS:-20}
      IAM_SYSADMIN_EMAIL: ${IAM_SYSADMIN_EMAIL:-sysadmin@axiomnizam.local}
      IAM_SYSADMIN_PASSWORD: ${IAM_SYSADMIN_PASSWORD:-changeme-on-first-login}
      DEMO_JWT_SECRET: ${DEMO_JWT_SECRET:-}
      IAM_RSA_PRIVATE_KEY: ${IAM_RSA_PRIVATE_KEY:-}
      IAM_RSA_PRIVATE_KEY_FILE: ${IAM_RSA_PRIVATE_KEY_FILE:-}
      IAM_INTERNAL_BASE_URL: ${IAM_INTERNAL_BASE_URL:-http://axiomnizam:8000}
      IAM_ISSUER_URL: ${IAM_ISSUER_URL:-https://axiomnizam-platform.bitbd.net}
      PUBLIC_FRONTEND_URL: ${PUBLIC_FRONTEND_URL:-https://axiomnizam.bitbd.net}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://axiomnizam.bitbd.net}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
    depends_on:
      # - valkey
      - etcd
      # - mysql
      # - mariadb
      - postgres
      # - clamav
      # - mongodb
      # - percona
      # - firebase
      # - oracle
      # - elasticsearch
    volumes:
      - query_logs:/data/query_logs
    networks:
      - app-network

  # Frontend Dashboard
  axiomnizam-frontend:
    build:
      context: ./frontend
    # image: shafiunmiraz/axiomnizam-axiomnizam-frontend:latest
    ports:
      - "7000:7000"
    environment:
      BACKEND_URL: ${PUBLIC_PLATFORM_URL:-https://axiomnizam-platform.bitbd.net}
      BACKEND_PROXY_URL: ${BACKEND_PROXY_URL:-https://axiomnizam-platform.bitbd.net}
      FRONTEND_PORT: ${FRONTEND_PORT:-7000}
      IAM_ISSUER_URL: ${IAM_ISSUER_URL:-https://axiomnizam-platform.bitbd.net}
    depends_on:
      - axiomnizam
    networks:
      - app-network

  # OpenClaw Gateway (optional) for SQL assistant chat provider
