services:
  # Go application
  axiomnizam:
    build: .
    container_name: axiomnizam
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - valkey
      - keycloak
      - etcd
      - mysql
      # - mariadb
      - postgres
      - mongodb
      # - percona
      # - firebase
      # - oracle
      # - elasticsearch
    volumes:
      - query_logs:/data/query_logs
    networks:
      - app-network

  # Frontend Dashboard
  axiomnizam-frontend:
    build: ./frontend
    container_name: axiomnizam-frontend
    ports:
      - "7000:7000"
    environment:
      BACKEND_URL: http://axiomnizam:8000
      FRONTEND_PORT: 7000
    depends_on:
      - axiomnizam
    networks:
      - app-network

  # Valkey (Redis alternative)
  valkey:
    image: valkey/valkey:latest
    container_name: valkey
    ports:
      - "6379:6379"
    networks:
      - app-network
    volumes:
      - valkey-data:/data
    command: valkey-server --appendonly yes --dir /data

  # Keycloak with PostgreSQL backend
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    ports:
      - "8080:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    command: start-dev
    volumes:
      - keycloak-data:/opt/keycloak/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # etcd
  etcd:
    image: quay.io/coreos/etcd:v3.5.9
    container_name: etcd
    ports:
      - "2379:2379"
      - "2380:2380"
    environment:
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
      ETCD_UNSUPPORTED_ARCH: arm64
      ETCD_DATA_DIR: /etcd-data
    networks:
      - app-network
    volumes:
      - etcd-data:/etcd-data

  # Test CLI for Distributed State Store
  axiomnizamctl:
    build:
      context: .
      dockerfile: Dockerfile.axiomnizamctl
    container_name: axiomnizamctl
    networks:
      - app-network
    depends_on:
      - etcd
    environment:
      ETCD_ENDPOINT: etcd:2379
    stdin_open: true
    tty: true
    restart: unless-stopped

  # MySQL
  mysql:
    image: mysql:8.0
    container_name: mysql8
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app_db
    networks:
      - app-network
    volumes:
      - mysql-data:/var/lib/mysql

  # MariaDB
  # mariadb:
  #   image: mariadb:latest
  #   container_name: mariadb
  #   ports:
  #     - "3307:3306"
  #   environment:
  #     MARIADB_ROOT_PASSWORD: root
  #     MARIADB_DATABASE: app_db
  #   networks:
  #     - app-network
  #   volumes:
  #     - mariadb-data:/var/lib/mysql

  # PostgreSQL
  postgres:
    image: postgres:latest
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_db
      POSTGRES_INITDB_ARGS: "-c shared_buffers=256MB -c max_connections=200"
    networks:
      - app-network
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./init-postgres.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # MongoDB
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    networks:
      - app-network
    volumes:
      - mongodb-data:/data/db

