  # etcd
  etcd:
    image: quay.io/coreos/etcd:v3.5.9
    container_name: etcd
    ports:
      - "2379:2379"
      - "2380:2380"
    environment:
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
      ETCD_UNSUPPORTED_ARCH: arm64
      ETCD_DATA_DIR: /etcd-data
    networks:
      - app-network
    volumes:
      - etcd-data:/etcd-data

  # Test CLI for Distributed State Store
  # axiomnizamctl:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.axiomnizamctl
  #   profiles:
  #     - openclaw
