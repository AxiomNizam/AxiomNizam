<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AxiomNizam Backend Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 1000px;
            width: 100%;
            padding: 40px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 20px;
        }

        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
        }

        .controls {
            text-align: center;
            margin-bottom: 30px;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background: #764ba2;
        }

        .refresh-time {
            color: #999;
            font-size: 0.9em;
            margin-top: 10px;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 30px;
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 25px;
            border-left: 5px solid #667eea;
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .status-item {
            margin: 15px 0;
            padding: 10px;
            background: white;
            border-radius: 5px;
        }

        .status-label {
            font-weight: bold;
            color: #333;
            display: block;
            margin-bottom: 5px;
        }

        .status-value {
            color: #666;
            font-size: 1.1em;
        }

        .status-ok {
            color: #27ae60;
            font-weight: bold;
        }

        .status-error {
            color: #e74c3c;
            font-weight: bold;
        }

        .status-disconnected {
            color: #f39c12;
            font-weight: bold;
        }

        .database-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .database-grid {
                grid-template-columns: 1fr;
            }
        }

        .db-checklist {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .db-item {
            background: white;
            padding: 12px;
            border-radius: 5px;
            border-left: 4px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s ease;
        }

        .db-item:hover {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .db-item.connected {
            border-left-color: #27ae60;
            background: #f0fff4;
        }

        .db-item.disconnected {
            border-left-color: #e74c3c;
            background: #fff5f5;
        }

        .db-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .db-icon {
            font-size: 1.2em;
            width: 25px;
        }

        .db-name {
            font-weight: 600;
            color: #333;
            min-width: 120px;
        }

        .db-status {
            font-size: 0.9em;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 3px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .db-status.connected {
            color: #27ae60;
            background: #d4edda;
        }

        .db-status.disconnected {
            color: #e74c3c;
            background: #f8d7da;
        }

        .status-icon {
            font-weight: bold;
            font-size: 1.1em;
        }

        .connected {
            color: #27ae60;
        }

        .disconnected {
            color: #e74c3c;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-size: 1.2em;
        }

        .error-message {
            background: #ffe6e6;
            color: #e74c3c;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid #e74c3c;
        }

        .success-message {
            background: #e6ffe6;
            color: #27ae60;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid #27ae60;
        }

        .backend-info {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            color: #666;
            font-size: 0.9em;
        }

        .auto-refresh-toggle {
            margin-top: 10px;
        }

        .auto-refresh-toggle label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            color: #666;
        }

        .auto-refresh-toggle input[type="checkbox"] {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 AxiomNizam Dashboard</h1>
            <p class="subtitle">Backend Status & Health Monitor</p>
        </header>

        <div class="controls">
            <button onclick="refreshData()">🔄 Refresh Now</button>
            <div class="auto-refresh-toggle">
                <label>
                    <input type="checkbox" id="autoRefresh" onchange="toggleAutoRefresh()" checked>
                    Auto-refresh every 5 seconds
                </label>
            </div>
            <div class="refresh-time">Last updated: <span id="lastUpdate">-</span></div>
        </div>

        <div id="messages"></div>

        <div class="content">
            <!-- Health Card -->
            <div class="card">
                <h2>💚 Health Status</h2>
                <div id="healthContent" class="loading">Loading...</div>
            </div>

            <!-- Database Status Card -->
            <div class="card">
                <h2>🗄️ Database Connections</h2>
                <div id="statusContent" class="loading">Loading...</div>
            </div>
        </div>

        <div class="backend-info">
            <p>📡 Connected to: <strong id="backendInfo">{{ .backendURL }}</strong></p>
        </div>
    </div>

    <script>
        let autoRefreshInterval = null;

        // Initial load
        window.addEventListener('DOMContentLoaded', () => {
            refreshData();
            startAutoRefresh();
        });

        function refreshData() {
            fetchHealth();
            fetchStatus();
            updateLastRefreshTime();
        }

        function fetchHealth() {
            fetch('/api/health')
                .then(response => response.json())
                .then(data => {
                    const healthContent = document.getElementById('healthContent');
                    healthContent.innerHTML = `
                        <div class="status-item">
                            <span class="status-label">Status</span>
                            <span class="status-value status-ok">${data.status ? data.status.toUpperCase() : 'UNKNOWN'}</span>
                        </div>
                        <div class="status-item">
                            <span class="status-label">Message</span>
                            <span class="status-value">${data.message || 'No message'}</span>
                        </div>
                    `;
                    showSuccessMessage('Health status retrieved successfully');
                })
                .catch(error => {
                    document.getElementById('healthContent').innerHTML = '<div class="error-message">Unable to fetch health status</div>';
                    showErrorMessage('Failed to fetch health: ' + error.message);
                });
        }

        function fetchStatus() {
            fetch('/api/status')
                .then(response => {
                    console.log('Status response:', response);
                    return response.json();
                })
                .then(data => {
                    console.log('Status data:', data);
                    const statusContent = document.getElementById('statusContent');
                    
                    // The actual response has databases in data.data
                    const databases = data.data || data.databases || {};
                    
                    console.log('Databases extracted:', databases);
                    console.log('Databases keys:', Object.keys(databases));
                    
                    if (databases && Object.keys(databases).length > 0) {
                        let dbHtml = '<div class="db-checklist">';
                        
                        // Sort databases by name for consistent display
                        const sortedDbs = Object.entries(databases).sort((a, b) => a[0].localeCompare(b[0]));
                        
                        for (const [dbName, dbStatus] of sortedDbs) {
                            const isConnected = dbStatus.toLowerCase() === 'connected';
                            const statusClass = isConnected ? 'connected' : 'disconnected';
                            const icon = isConnected ? '✓' : '✕';
                            const statusIcon = isConnected ? '✔️' : '❌';
                            
                            dbHtml += `
                                <div class="db-item ${statusClass}">
                                    <div class="db-info">
                                        <div class="db-icon">${icon}</div>
                                        <div class="db-name">${capitalizeFirstLetter(dbName)}</div>
                                    </div>
                                    <div class="db-status ${statusClass}">
                                        <span class="status-icon">${statusIcon}</span>
                                        <span>${dbStatus}</span>
                                    </div>
                                </div>
                            `;
                        }
                        dbHtml += '</div>';
                        statusContent.innerHTML = dbHtml;
                    } else {
                        statusContent.innerHTML = '<div class="error-message">No database information available. Data: ' + JSON.stringify(databases) + '</div>';
                    }
                    showSuccessMessage('Database status retrieved successfully');
                })
                .catch(error => {
                    document.getElementById('statusContent').innerHTML = '<div class="error-message">Unable to fetch database status</div>';
                    showErrorMessage('Failed to fetch status: ' + error.message);
                });
        }

        function toggleAutoRefresh() {
            const checkbox = document.getElementById('autoRefresh');
            if (checkbox.checked) {
                startAutoRefresh();
            } else {
                stopAutoRefresh();
            }
        }

        function startAutoRefresh() {
            if (!autoRefreshInterval) {
                autoRefreshInterval = setInterval(refreshData, 5000);
            }
        }

        function stopAutoRefresh() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
            }
        }

        function updateLastRefreshTime() {
            const now = new Date();
            const time = now.toLocaleTimeString();
            document.getElementById('lastUpdate').textContent = time;
        }

        function showErrorMessage(message) {
            const messagesDiv = document.getElementById('messages');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.textContent = '❌ ' + message;
            messagesDiv.innerHTML = '';
            messagesDiv.appendChild(errorDiv);
            setTimeout(() => errorDiv.remove(), 5000);
        }

        function showSuccessMessage(message) {
            // Uncomment to show success messages
            // const messagesDiv = document.getElementById('messages');
            // const successDiv = document.createElement('div');
            // successDiv.className = 'success-message';
            // successDiv.textContent = '✅ ' + message;
            // messagesDiv.innerHTML = '';
            // messagesDiv.appendChild(successDiv);
            // setTimeout(() => successDiv.remove(), 3000);
        }

        function capitalizeFirstLetter(string) {
            return string.charAt(0).toUpperCase() + string.slice(1);
        }
    </script>
</body>
</html>
