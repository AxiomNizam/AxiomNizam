{{ define "public-dashboard" }}
<div class="dashboard-container">
    <!-- Header Section -->
    <div class="dashboard-header">
        <div class="header-content">
            <h1>🚀 AxiomNizam Dashboard</h1>
            <p class="subtitle">Real-time Backend Status & API Monitor</p>
        </div>
    </div>

    <!-- Control Panel -->
    <div class="control-panel">
        <div class="control-left">
            <button onclick="refreshData()" class="btn btn-primary">🔄 Refresh Now</button>
            <label class="auto-refresh-label">
                <input type="checkbox" id="autoRefresh" onchange="toggleAutoRefresh()" checked>
                <span>Auto-refresh every 5 seconds</span>
            </label>
        </div>
        <div class="control-right">
            <div class="last-update">Last updated: <span id="lastUpdate">-</span></div>
        </div>
    </div>

    <!-- Messages Area -->
    <div id="messages" class="messages-area"></div>

    <!-- Status Cards Grid -->
    <div class="status-grid">
        <!-- Health Status Card -->
        <div class="status-card">
            <div class="card-header">
                <h2>💚 Health Status</h2>
            </div>
            <div id="healthContent" class="card-content loading">Loading...</div>
        </div>

        <!-- Database Connections Card -->
        <div class="status-card">
            <div class="card-header">
                <h2>🗄️ Database Connections</h2>
            </div>
            <div id="statusContent" class="card-content loading">Loading...</div>
        </div>

        <!-- Backend Info Card -->
        <div class="status-card">
            <div class="card-header">
                <h2>📡 Backend URL</h2>
            </div>
            <div class="card-content">
                <div class="backend-url-display" id="backendInfo">-</div>
            </div>
        </div>
    </div>

    <!-- APIs Section -->
    <div class="apis-section">
        <div class="section-header">
            <h2>📦 Available APIs</h2>
            <p>Click any endpoint for details</p>
        </div>
        <div id="apisContent" class="apis-grid loading">Loading...</div>
    </div>

    <!-- Hidden element to pass backend URL to JS -->
    <div id="backendURL" style="display:none;">{{ .backendURL }}</div>
</div>

<script src="/static/dashboard.js"></script>
{{ end }}

<style>
    .old-dashboard-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
    }

    .old-dashboard-header {
        text-align: center;
        margin-bottom: 30px;
        border-bottom: 2px solid var(--primary-color);
        padding-bottom: 20px;
    }

    .old-dashboard-header h1 {
        font-size: 2.2em;
        margin-bottom: 10px;
    }

    .old-dashboard-subtitle {
        color: var(--text-secondary);
        font-size: 1em;
    }

    .old-dashboard-controls {
        text-align: center;
        margin-bottom: 30px;
    }

    .refresh-btn {
        background: var(--primary-color);
        color: white;
        border: none;
        padding: 12px 30px;
        font-size: 1em;
        border-radius: 6px;
        cursor: pointer;
        transition: var(--transition);
        margin-bottom: 15px;
    }

    .refresh-btn:hover {
        background: var(--primary-dark);
        transform: scale(1.05);
    }

    .refresh-time {
        color: var(--text-muted);
        font-size: 0.9em;
        margin-top: 10px;
    }

    .auto-refresh-toggle label {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        cursor: pointer;
        color: var(--text-secondary);
        margin: 10px 0;
    }

    .auto-refresh-toggle input[type="checkbox"] {
        cursor: pointer;
        width: 18px;
        height: 18px;
    }

    .old-dashboard-content {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
        margin-top: 30px;
    }

    @media (max-width: 768px) {
        .old-dashboard-content {
            grid-template-columns: 1fr;
        }
    }

    .old-dashboard-card {
        background: var(--card-bg);
        border-radius: 8px;
        padding: 25px;
        border-left: 5px solid var(--primary-color);
        box-shadow: var(--shadow-md);
    }

    .old-dashboard-card h2 {
        color: var(--text-primary);
        margin-bottom: 20px;
        font-size: 1.5em;
    }

    .status-item {
        margin: 15px 0;
        padding: 10px;
        background: rgba(59, 130, 246, 0.1);
        border-radius: 5px;
    }

    .status-label {
        font-weight: bold;
        color: var(--text-primary);
        display: block;
        margin-bottom: 5px;
    }

    .status-value {
        color: var(--text-secondary);
        font-size: 1.1em;
    }

    .status-ok {
        color: var(--success-color);
        font-weight: bold;
    }

    .status-error {
        color: var(--danger-color);
        font-weight: bold;
    }

    .status-disconnected {
        color: var(--warning-color);
        font-weight: bold;
    }

    .db-checklist {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 20px;
    }

    .db-item {
        background: rgba(255, 255, 255, 0.05);
        padding: 12px;
        border-radius: 5px;
        border-left: 4px solid var(--border-color);
        display: flex;
        align-items: center;
        justify-content: space-between;
        transition: all 0.3s ease;
    }

    .db-item:hover {
        box-shadow: var(--shadow-md);
    }

    .db-item.connected {
        border-left-color: var(--success-color);
        background: rgba(16, 185, 129, 0.1);
    }

    .db-item.disconnected {
        border-left-color: var(--danger-color);
        background: rgba(239, 68, 68, 0.1);
    }

    .db-info {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .db-icon {
        font-size: 1.2em;
        width: 25px;
    }

    .db-name {
        font-weight: 600;
        color: var(--text-primary);
        min-width: 120px;
    }

    .db-status {
        font-size: 0.9em;
        font-weight: 500;
        padding: 4px 10px;
        border-radius: 3px;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .db-status.connected {
        color: var(--success-color);
        background: rgba(16, 185, 129, 0.2);
    }

    .db-status.disconnected {
        color: var(--danger-color);
        background: rgba(239, 68, 68, 0.2);
    }

    .loading {
        text-align: center;
        color: var(--primary-light);
        font-size: 1.2em;
        padding: 20px;
    }

    .error-message {
        background: rgba(239, 68, 68, 0.2);
        color: var(--danger-color);
        padding: 15px;
        border-radius: 5px;
        margin-bottom: 20px;
        border-left: 4px solid var(--danger-color);
    }

    .success-message {
        background: rgba(16, 185, 129, 0.2);
        color: var(--success-color);
        padding: 15px;
        border-radius: 5px;
        margin-bottom: 20px;
        border-left: 4px solid var(--success-color);
    }

    .backend-info {
        text-align: center;
        margin-top: 30px;
        padding-top: 20px;
        border-top: 1px solid var(--border-color);
        color: var(--text-muted);
        font-size: 0.9em;
    }

    .api-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
        margin-top: 20px;
    }

    @media (max-width: 768px) {
        .api-grid {
            grid-template-columns: 1fr;
        }
    }

    .api-item {
        background: var(--card-bg);
        padding: 16px;
        border-radius: 6px;
        border-left: 4px solid var(--primary-color);
        box-shadow: var(--shadow-sm);
        transition: all 0.3s ease;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .api-item:hover {
        box-shadow: var(--shadow-md);
        transform: translateY(-3px);
    }

    .api-method {
        display: inline-block;
        font-weight: 700;
        font-size: 0.8em;
        padding: 6px 12px;
        border-radius: 4px;
        margin-bottom: 4px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        width: fit-content;
    }

    .api-method.get {
        background: rgba(59, 130, 246, 0.25);
        color: var(--primary-light);
        border: 1px solid rgba(59, 130, 246, 0.4);
    }

    .api-method.post {
        background: rgba(245, 158, 11, 0.25);
        color: var(--warning-color);
        border: 1px solid rgba(245, 158, 11, 0.4);
    }

    .api-method.put {
        background: rgba(99, 102, 241, 0.25);
        color: #6366f1;
        border: 1px solid rgba(99, 102, 241, 0.4);
    }

    .api-method.delete {
        background: rgba(239, 68, 68, 0.25);
        color: var(--danger-color);
        border: 1px solid rgba(239, 68, 68, 0.4);
    }

    .api-path {
        font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Courier New', monospace;
        font-size: 0.9em;
        color: var(--primary-light);
        word-break: break-all;
        background: rgba(0, 0, 0, 0.1);
        padding: 8px;
        border-radius: 4px;
        margin: 4px 0;
    }

    .api-description {
        font-size: 0.9em;
        color: var(--text-secondary);
        margin-top: 4px;
    }

    .api-auth {
        font-size: 0.8em;
        padding: 6px 10px;
        border-radius: 4px;
        background: rgba(239, 68, 68, 0.15);
        color: var(--danger-color);
        border: 1px solid rgba(239, 68, 68, 0.3);
        display: inline-block;
        font-weight: 500;
        margin-top: 4px;
    }

    .api-category {
        margin-bottom: 30px;
    }

    .api-category-title {
        font-size: 1.2em;
        font-weight: 700;
        color: var(--primary-color);
        margin-bottom: 15px;
        padding-bottom: 10px;
        border-bottom: 2px solid var(--primary-color);
    }
</style>

<script src="/static/dashboard.js"></script>
{{ end }}
