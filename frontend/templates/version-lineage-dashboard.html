{{ define "version-lineage-dashboard" }}
<div class="platform-console">
    <div class="platform-hero">
        <h1>Version & Lineage Explorer</h1>
        <p>Track history, compare versions, inspect data lineage, and search traces.</p>
    </div>

    <div class="platform-grid">
        <section class="platform-card platform-col-6">
            <h3>Version History</h3>
            <form id="versionHistoryForm" class="platform-form">
                <input id="vhType" type="text" placeholder="Resource type (api|workflow|dataset)" required>
                <input id="vhId" type="text" placeholder="Resource ID" required>
                <button class="platform-btn primary" type="submit">Load History</button>
            </form>

            <h3 style="margin-top:14px">Version Diff</h3>
            <form id="versionDiffForm" class="platform-form">
                <input id="vdType" type="text" placeholder="Resource type" required>
                <input id="vdId" type="text" placeholder="Resource ID" required>
                <input id="vdFrom" type="number" placeholder="From" value="1" required>
                <input id="vdTo" type="number" placeholder="To" value="2" required>
                <button class="platform-btn secondary" type="submit">Get Diff</button>
            </form>
        </section>

        <section class="platform-card platform-col-6">
            <h3>Lineage Graph</h3>
            <form id="lineageGraphForm" class="platform-form">
                <input id="lgType" type="text" placeholder="Resource type" required>
                <input id="lgId" type="text" placeholder="Resource ID" required>
                <button class="platform-btn primary" type="submit">Load Graph</button>
            </form>

            <h3 style="margin-top:14px">Impact Analysis</h3>
            <form id="lineageImpactForm" class="platform-form">
                <input id="liType" type="text" placeholder="Resource type" required>
                <input id="liId" type="text" placeholder="Resource ID" required>
                <button class="platform-btn secondary" type="submit">Analyze Impact</button>
            </form>
        </section>

        <section class="platform-card platform-col-12">
            <h3>Trace Search</h3>
            <form id="traceSearchForm" class="platform-form" style="grid-template-columns: 2fr 1fr auto; align-items:center;">
                <input id="tsService" type="text" placeholder="Service name">
                <input id="tsLimit" type="number" value="20" min="1" max="200">
                <button class="platform-btn primary" type="submit">Search</button>
            </form>
        </section>

        <section class="platform-card platform-col-12">
            <h3>Explorer Output</h3>
            <pre class="platform-json" id="versionLineageResponse">No query executed yet.</pre>
        </section>
    </div>
</div>
<script src="/static/version-lineage-dashboard.js?v=20260405-2"></script>
{{ end }}
