# Supply Chain Security CI Pipeline (Phase 12)
# Runs govulncheck, SBOM generation, dependency verification, and container signing.
name: Supply Chain Security

on:
  push:
    branches: [main, master, "miraz-ui"]
  pull_request:
    branches: [main, master]
  schedule:
    # Run vulnerability scan daily at 06:00 UTC
    - cron: "0 6 * * *"

permissions:
  contents: read
  packages: write
  id-token: write  # for cosign keyless signing

env:
  GO_VERSION: "1.25"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Job 1: Vulnerability scanning with govulncheck ──────────────────────
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...
        continue-on-error: false

  # ── Job 2: Dependency pinning verification ──────────────────────────────
  verify-deps:
    name: Verify dependency integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Verify go.sum integrity
        run: |
          echo "=== Verifying go.mod/gosum consistency ==="
          go mod verify
          echo "=== Checking for direct dependency updates ==="
          go mod tidy
          git diff --exit-code go.mod go.sum || {
            echo "::error::go.mod/go.sum are not tidy. Run 'go mod tidy' and commit."
            exit 1
          }

      - name: Check for known vulnerable modules
        run: |
          echo "=== Listing all dependencies ==="
          go list -m all | wc -l
          echo "=== Checking module graph ==="
          go mod graph | head -50

  # ── Job 3: SBOM generation ──────────────────────────────────────────────
  generate-sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Generate Go SBOM (CycloneDX)
        run: |
          go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest
          cyclonedx-gomod app -output sbom-go.json -json
          echo "=== SBOM generated ==="
          cat sbom-go.json | head -30

      - name: Generate dependency list
        run: |
          echo "# Go Dependency SBOM — $(date -u +%Y-%m-%dT%H:%M:%SZ)" > sbom-deps.txt
          echo "module: $(head -1 go.mod | awk '{print $2}')" >> sbom-deps.txt
          echo "go_version: $(grep '^go ' go.mod | awk '{print $2}')" >> sbom-deps.txt
          echo "" >> sbom-deps.txt
          echo "## Direct Dependencies" >> sbom-deps.txt
          go list -m -json all | jq -r 'select(.Main != true) | "\(.Path) \(.Version)"' >> sbom-deps.txt
          echo "=== Dependency SBOM generated ==="

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom-go.json
            sbom-deps.txt
          retention-days: 90

  # ── Job 4: Container build + signing ────────────────────────────────────
  build-and-sign:
    name: Build & sign container image
    runs-on: ubuntu-latest
    needs: [govulncheck, verify-deps]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign container image (keyless)
        env:
          DIGEST: ${{ steps.meta.outputs.digest }}
        run: |
          echo "=== Signing image with cosign (keyless) ==="
          cosign sign --yes ${REGISTRY}/${IMAGE_NAME}@${DIGEST}
          echo "=== Verifying signature ==="
          cosign verify ${REGISTRY}/${IMAGE_NAME}@${DIGEST} \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com"
          echo "=== Image signed and verified ==="

  # ── Job 5: Container vulnerability scan ─────────────────────────────────
  scan-image:
    name: Scan container image
    runs-on: ubuntu-latest
    needs: [build-and-sign]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build image for scanning
        run: docker build -t axiomnizam:scan .

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "axiomnizam:scan"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
