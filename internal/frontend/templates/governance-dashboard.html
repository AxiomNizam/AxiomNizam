{{ define "governance-dashboard" }}
<div class="platform-console">
    <div class="platform-hero">
        <h1>Governance Console</h1>
        <p>Tenant administration, role management, and access checks.</p>
    </div>

    <div class="platform-grid">
        <section class="platform-card platform-col-6">
            <h3>Create Tenant</h3>
            <form class="platform-form" id="tenantCreateForm">
                <input type="text" id="tenantName" placeholder="Tenant name" required>
                <input type="text" id="tenantOwner" placeholder="Owner user ID" required>
                <select id="tenantTier">
                    <option value="FREE">FREE</option>
                    <option value="PRO">PRO</option>
                    <option value="ENTERPRISE">ENTERPRISE</option>
                </select>
                <select id="tenantIsolation">
                    <option value="SHARED">SHARED</option>
                    <option value="SCHEMA">SCHEMA</option>
                    <option value="DATABASE">DATABASE</option>
                </select>
                <div class="platform-actions">
                    <button class="platform-btn primary" type="submit">Create Tenant</button>
                    <button class="platform-btn secondary" type="button" onclick="loadGovernanceData()">Refresh</button>
                </div>
            </form>
        </section>

        <section class="platform-card platform-col-6">
            <h3>Create Role</h3>
            <form class="platform-form" id="roleCreateForm">
                <input type="text" id="roleTenantId" placeholder="Tenant ID" required>
                <input type="text" id="roleName" placeholder="Role name" required>
                <input type="text" id="roleDescription" placeholder="Description">
                <div class="platform-actions">
                    <button class="platform-btn primary" type="submit">Create Role</button>
                </div>
            </form>

            <h3 style="margin-top:14px">Permission Check</h3>
            <form class="platform-form" id="permissionCheckForm">
                <input type="text" id="checkTenantId" placeholder="Tenant ID">
                <input type="text" id="checkPrincipalId" placeholder="Principal ID" required>
                <input type="text" id="checkResource" placeholder="Resource" required>
                <input type="text" id="checkAction" placeholder="Action" required>
                <button class="platform-btn secondary" type="submit">Run Check</button>
            </form>
        </section>

        <section class="platform-card platform-col-6">
            <h3>Tenants</h3>
            <div class="platform-list" id="tenantList"></div>
        </section>

        <section class="platform-card platform-col-6">
            <h3>Roles</h3>
            <div class="platform-list" id="roleList"></div>
        </section>

        <section class="platform-card platform-col-12">
            <h3>Response</h3>
            <pre class="platform-json" id="governanceResponse">No requests yet.</pre>
        </section>
    </div>
</div>
<script src="/static/governance-dashboard.js?v=20260405-2"></script>
{{ end }}
