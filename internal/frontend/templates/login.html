{{ define "login" }}
<section class="login-page-shell">
    <div class="login-page-card modal-content login-modal enhanced-login-card">
        <div class="modal-header login-header-enhanced">
            <div class="login-brand-icon">
                <img src="/static/axiomnizam-logo-minimal.svg" alt="AxiomNizam Logo" width="34" height="34" style="border-radius: 50%; box-shadow: 0 0 10px rgba(0, 140, 99, 0.4);">
            </div>
            <h2>Sign in to AxiomNizam</h2>
        </div>
        <div class="modal-body">
            <p class="login-page-subtitle">Authenticate with IAM to access dashboards, governance, and platform tooling.</p>

            <form class="login-page-form" onsubmit="handleLogin(event)">
                <div class="form-group enhanced-input-group">
                    <label for="username">Username</label>
                    <div class="input-with-icon">
                        <svg class="input-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <input type="text" id="username" name="username" placeholder="Enter username or email" autocomplete="username" required>
                    </div>
                </div>
                <div class="form-group enhanced-input-group">
                    <label for="password">Password</label>
                    <div class="input-with-icon">
                        <svg class="input-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password" required>
                    </div>
                </div>
                <button type="submit" class="btn-primary btn-large login-btn-enhanced">
                    <span>Secure Login</span>
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </form>

            <div class="idp-divider"><span>or continue with</span></div>

            <div id="idpButtonsContainer" class="idp-buttons">
                <!-- Dynamically loaded identity provider buttons -->
                <button type="button" class="btn-secondary idp-mock-btn" onclick="alert('SSO login not configured yet')">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                        <path d="M2 12h20"></path>
                    </svg>
                    <span>Single Sign-On (SSO)</span>
                </button>
            </div>

            <p class="login-hint">AxiomNizam IAM - Roles: sysadmin | admin | manager | user</p>
        </div>
    </div>
</section>
{{ end }}
