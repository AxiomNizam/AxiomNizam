{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "axiomnizam.postgres.fullname" . }}-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "axiomnizam.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  accessModes:
    - {{ .Values.postgresql.storage.accessMode }}
  {{- if .Values.postgresql.storage.storageClass }}
  storageClassName: {{ .Values.postgresql.storage.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.postgresql.storage.size }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "axiomnizam.postgres.fullname" . }}-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "axiomnizam.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
data:
  01-init.sql: |
    -- Built-in IAM uses the existing application PostgreSQL database.
    -- No separate external IdP database bootstrap is required.
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "axiomnizam.postgres.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "axiomnizam.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  serviceName: {{ include "axiomnizam.postgres.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "axiomnizam.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        {{- include "axiomnizam.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: postgres
          image: {{ .Values.postgresql.image }}
          ports:
            - name: postgres
              containerPort: {{ .Values.postgresql.port }}
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "axiomnizam.fullname" . }}
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.database | quote }}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgresql.user }}
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgresql.user }}
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          {{- with .Values.postgresql.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: {{ include "axiomnizam.postgres.fullname" . }}-data
        - name: init-sql
          configMap:
            name: {{ include "axiomnizam.postgres.fullname" . }}-init
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "axiomnizam.postgres.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "axiomnizam.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.postgresql.port }}
      targetPort: postgres
      protocol: TCP
      name: postgres
  selector:
    {{- include "axiomnizam.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
{{- end }}
