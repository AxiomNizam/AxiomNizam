{{- if .Values.persistence.raft.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "axiomnizam.fullname" . }}-raft
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "axiomnizam.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.persistence.raft.accessMode }}
  {{- if .Values.persistence.raft.storageClass }}
  storageClassName: {{ .Values.persistence.raft.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.raft.size }}
---
{{- end }}
{{- if .Values.persistence.storage.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "axiomnizam.fullname" . }}-storage
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "axiomnizam.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.persistence.storage.accessMode }}
  {{- if .Values.persistence.storage.storageClass }}
  storageClassName: {{ .Values.persistence.storage.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.storage.size }}
---
{{- end }}
