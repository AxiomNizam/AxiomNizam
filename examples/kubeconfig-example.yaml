# AxiomNizam Configuration File (kubeconfig-style)
# Location: ~/.axiomnizam/config
# This file manages contexts, clusters, and authentication for axiomnizamctl

apiVersion: axiom-nizam/v1
kind: Config

# Currently active context
current-context: production

# List of contexts - each context specifies cluster, user, and namespace
contexts:
  - name: production
    cluster:
      server: https://api.prod.example.com
      insecure-skip-tls-verify: false
      certificate-authority-data: LS0tLS1CRUdJTi... # base64 encoded CA cert
    user: team-prod-user
    namespace: production

  - name: staging
    cluster:
      server: https://api.staging.example.com
      insecure-skip-tls-verify: false
    user: team-staging-user
    namespace: staging

  - name: development
    cluster:
      server: http://localhost:8000
      insecure-skip-tls-verify: true
    user: dev-user
    namespace: default

  - name: local
    cluster:
      server: http://localhost:8000
      insecure-skip-tls-verify: true
    user: local-dev
    namespace: default

# Users are managed separately via ~/.axiomnizam/token
# This keeps sensitive credentials out of the kubeconfig file
